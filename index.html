<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orario del giorno</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap');

:root {
  --bg:      #f0ede6;
  --paper:   #faf9f6;
  --ink:     #1c1a16;
  --muted:   #8a8478;
  --border:  #dbd8d0;
  --accent:  #b83a20;
  --acc-bg:  #f7ece8;
  --y1:      #dceeff; --y1b: #6da4d8;
  --y2:      #d9f2e3; --y2b: #5ab882;
  --y3:      #fff4d0; --y3b: #d4aa30;
  --y4:      #fde0f3; --y4b: #c060a0;
  --gol:     #ece6ff; --golb: #8060c8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);color:var(--ink);
  display:flex;flex-direction:column;height:100vh;
}

/* HEADER */
header{
  flex:0 0 52px;background:var(--ink);
  display:flex;align-items:center;padding:0 18px;gap:14px;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;background:var(--accent);color:#fff;padding:3px 7px;border-radius:3px;}
.brand-title{font-size:15px;font-weight:500;color:#f0ede6;letter-spacing:-.01em;}
.hdr-right{display:flex;align-items:center;gap:10px;}
#hdr-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(240,237,230,.45);letter-spacing:.06em;}
.ghost-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(240,237,230,.22);border-radius:4px;padding:5px 11px;background:transparent;color:rgba(240,237,230,.6);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ghost-btn:hover{border-color:var(--accent);color:#f0ede6;}

/* CONTROLS */
#controls{
  flex:0 0 48px;background:var(--paper);border-bottom:1px solid var(--border);
  display:none;align-items:center;padding:0 14px;gap:8px;overflow-x:auto;
}
.ctrl-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 2px;}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex-shrink:0;}
select,input[type=text]{
  font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;
  border:1px solid var(--border);border-radius:5px;padding:5px 9px;
  background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s;flex-shrink:0;
}
select{min-width:145px;}
input[type=text]{width:125px;}
select:focus,input[type=text]:focus{border-color:var(--accent);}
.reset-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border);border-radius:5px;padding:5px 11px;background:transparent;cursor:pointer;color:var(--muted);transition:all .15s;flex-shrink:0;}
.reset-btn:hover{border-color:var(--accent);color:var(--accent);}
#count-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0;white-space:nowrap;}

/* MAIN */
#main{flex:1 1 0;overflow:hidden;display:flex;flex-direction:column;}

/* LOADING / ERROR STATES */
#state-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;text-align:center;padding:32px;
}
#state-screen svg{color:var(--muted);}
#state-screen h2{font-size:16px;font-weight:500;}
#state-screen p{font-size:13px;color:var(--muted);line-height:1.6;max-width:400px;}
#state-screen .spin{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Manual upload fallback (shown only on error) */
.upload-fallback{
  margin-top:20px;padding:16px 22px;background:var(--paper);
  border:1px solid var(--border);border-radius:8px;max-width:380px;
}
.upload-fallback p{font-size:12px;color:var(--muted);margin-bottom:10px;}
.upload-fallback label{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:5px;
  padding:7px 16px;background:var(--accent);color:#fff;cursor:pointer;
}
.upload-fallback label:hover{background:#a03018;}
#file-input{display:none;}

/* TABLE WRAP */
#table-wrap{flex:1;overflow:auto;display:none;}

/* LEGEND */
#legend{
  flex:0 0 34px;display:none;align-items:center;gap:12px;padding:0 14px;
  background:var(--paper);border-top:1px solid var(--border);font-size:11px;color:var(--muted);overflow-x:auto;
}
#legend.on{display:flex;}
.leg{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* TABLE */
table{border-collapse:collapse;min-width:max-content;width:100%;}

thead th{
  position:sticky;top:0;z-index:10;background:var(--bg);
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  font-weight:500;color:var(--muted);padding:8px 7px 6px;text-align:left;
  border-bottom:2px solid var(--border);white-space:nowrap;min-width:108px;
}
thead th.th-time{min-width:58px;width:58px;left:0;z-index:20;border-right:2px solid var(--border);}
.cn{font-size:13px;font-weight:600;color:var(--ink);display:block;margin-bottom:1px;letter-spacing:0;}

tbody tr:nth-child(even){background:rgba(0,0,0,.016);}
tbody tr:hover{background:var(--acc-bg);}
tbody tr.divrow td{height:4px;background:var(--bg);border:none;padding:0;}
tbody tr.divrow td.dlabel{
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);padding:2px 8px 0;vertical-align:middle;
}

td{padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top;}
td:last-child{border-right:none;}

.td-time{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  padding:8px;background:var(--bg);border-right:2px solid var(--border)!important;
  white-space:nowrap;vertical-align:top;position:sticky;left:0;z-index:5;
}

/* CARD */
.card{
  margin:3px;padding:6px 7px;border-radius:4px;border-left:3px solid transparent;
  font-size:11px;line-height:1.4;transition:opacity .15s;
}
.card.y1{background:var(--y1);border-color:var(--y1b);}
.card.y2{background:var(--y2);border-color:var(--y2b);}
.card.y3{background:var(--y3);border-color:var(--y3b);}
.card.y4{background:var(--y4);border-color:var(--y4b);}
.card.gol{background:var(--gol);border-color:var(--golb);}
.card.dim{opacity:.11;}
.ct{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:1px;}
.cu{font-weight:600;font-size:11.5px;color:var(--ink);}
.cr{font-size:9.5px;color:var(--muted);margin-top:1px;}
.cd{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;}
.empty-cell{min-height:18px;}

.no-results{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px;font-size:13px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-tag">CFP</span>
    <span class="brand-title">Orario del giorno</span>
  </div>
  <div class="hdr-right">
    <span id="hdr-date"></span>
    <button class="ghost-btn" id="btn-pub" style="display:none" onclick="downloadJson()">↓ Salva orario.json</button>
    <button class="ghost-btn" id="btn-new" style="display:none" onclick="showUpload()">+ Carica file</button>
  </div>
</header>

<div id="controls">
  <span class="lbl">Docente</span>
  <select id="f-teacher"><option value="">— tutti —</option></select>
  <div class="ctrl-sep"></div>
  <span class="lbl">Aula</span>
  <select id="f-room"><option value="">— tutte —</option></select>
  <div class="ctrl-sep"></div>
  <span class="lbl">Materia</span>
  <input type="text" id="f-sub" placeholder="es. italiano…">
  <div class="ctrl-sep"></div>
  <button class="reset-btn" onclick="resetFilters()">✕ azzera</button>
  <span id="count-badge"></span>
</div>

<div id="main">

  <!-- STATE SCREEN: loading / error / upload -->
  <div id="state-screen">
    <div class="spin" id="spin"></div>
    <h2 id="state-title">Caricamento orario…</h2>
    <p id="state-msg">Recupero il file dell'orario dal server.</p>
    <!-- shown only on error -->
    <div class="upload-fallback" id="upload-fallback" style="display:none">
      <p>Oppure carica manualmente il file XLS:</p>
      <label>Scegli file XLS <input type="file" id="file-input" accept=".xls,.xlsx"></label>
    </div>
  </div>

  <!-- TABLE -->
  <div id="table-wrap"><div id="tbl"></div></div>

</div>

<div id="legend">
  <span class="lbl" style="margin-right:2px">Anno:</span>
  <div class="leg"><div class="swatch" style="background:var(--y1);border:1.5px solid var(--y1b)"></div>1°</div>
  <div class="leg"><div class="swatch" style="background:var(--y2);border:1.5px solid var(--y2b)"></div>2°</div>
  <div class="leg"><div class="swatch" style="background:var(--y3);border:1.5px solid var(--y3b)"></div>3°</div>
  <div class="leg"><div class="swatch" style="background:var(--y4);border:1.5px solid var(--y4b)"></div>4°</div>
  <div class="leg"><div class="swatch" style="background:var(--gol);border:1.5px solid var(--golb)"></div>GOL/FAMI/IFTS</div>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const LESSON_STYLES = new Set(['1','2','4','5']);
const MORNING_SLOTS   = ['08:30','09:30','10:30','11:30','12:30','13:30'];
const AFTERNOON_SLOTS = ['14:00','15:00','16:00','17:00'];
const H2S = {
  '09:00':'08:30','10:00':'09:30','11:00':'10:30',
  '12:00':'11:30','13:00':'12:30','14:00':'13:30',
  '15:00':'14:00','16:00':'15:00','17:00':'16:00','18:00':'17:00',
};
const ST2S = {
  '08:30':'08:30','09:30':'09:30','10:30':'10:30',
  '11:30':'11:30','12:30':'12:30','13:30':'13:30',
  '14:30':'14:00','15:30':'15:00','16:30':'16:00','17:30':'17:00',
};

// ═══════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════
function parseXLS(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText,'text/xml');
  const SS = 'urn:schemas-microsoft-com:office:spreadsheet';
  const ws = doc.getElementsByTagNameNS(SS,'Worksheet')[0];
  const sheetName = ws.getAttribute('ss:Name')||'';
  const table = ws.getElementsByTagNameNS(SS,'Table')[0];
  const rowEls = [...table.getElementsByTagNameNS(SS,'Row')];
  const rooms = {};
  const rawLessons = [];
  let currentHour = null;

  function txt(cell){
    const d=cell.getElementsByTagNameNS(SS,'Data')[0];
    if(!d)return null;
    return d.textContent.trim()||null;
  }
  function sty(cell){return cell.getAttribute('ss:StyleID')||'';}

  for(let ri=0;ri<rowEls.length;ri++){
    const cells=[...rowEls[ri].getElementsByTagNameNS(SS,'Cell')];
    let col=1;
    for(const cell of cells){
      const idx=cell.getAttribute('ss:Index');
      if(idx)col=parseInt(idx);
      const s=sty(cell),t=txt(cell);
      if(ri===3&&t)rooms[col]=t;
      if(ri>=4){
        if(s==='s02'&&t)currentHour=t;
        if(LESSON_STYLES.has(s)&&t){
          const p=parseCell(t,currentHour);
          if(p){p.room=rooms[col]||`col${col}`;p.fileHour=currentHour;rawLessons.push(p);}
        }
      }
      col++;
    }
  }
  return{title:sheetName,rooms,rawLessons};
}

function extractCode(raw){
  const m=raw.match(/^(\d[A-Z\/]+)/);if(m)return m[1].replace(/_$/,'');
  const p=raw.split('_');
  if(['MI','FAMI','XXXX'].includes(p[0]))return p.slice(0,3).join('_');
  return p[0];
}
function yr(c){
  if(!c)return'gol';
  for(const y of'1234')if(c.startsWith(y))return`y${y}`;
  return'gol';
}
function parseCell(raw,fileHour){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return null;
  let startTime=null,classCode=null,course=null,uf=null,teacher=null;
  const fl=lines[0];
  const tm=fl.match(/^(\d{2}:\d{2})\s+(.+)$/);
  if(tm){
    startTime=tm[1];
    const rest=tm[2].trim();
    const cm=rest.match(/^([A-Z0-9\/_\-\.]+(?:\/[\d_]+)?)\s*/);
    classCode=cm?extractCode(cm[1]):rest.split(/\s+/)[0];
  } else {
    const cm=fl.match(/^([A-Z0-9\/_\-\.]+(?:\/[\d_]+)?)/);
    classCode=cm?extractCode(cm[1]):fl.slice(0,20);
  }
  for(let i=1;i<lines.length;i++){
    const l=lines[i];
    if(l.startsWith('UF:'))uf=l.slice(3).trim();
    else if(l.startsWith('DOC:'))teacher=l.slice(4).trim();
    else if(!course&&!/^[A-Z0-9\/_\-]+$/.test(l))course=l;
  }
  if(!teacher&&!uf)return null;
  return{startTime,classCode,course,uf,teacher};
}

// ═══════════════════════════════════════════
// BUILD SCHEDULE
// ═══════════════════════════════════════════
function buildSchedule(rawLessons,titleStr){
  const seen=new Set();
  const lessons=[];

  for(const r of rawLessons){
    let slot;
    if(r.startTime&&ST2S[r.startTime]){
      slot=ST2S[r.startTime];
    } else if(['14:00','15:00','16:00','17:00'].includes(r.fileHour)){
      slot=r.fileHour;
    } else {
      slot=H2S[r.fileHour]||r.fileHour;
    }
    const key=`${r.classCode}|${r.uf}|${r.teacher}|${slot}`;
    if(seen.has(key))continue;
    seen.add(key);
    lessons.push({slot,classCode:r.classCode,course:r.course,uf:r.uf,teacher:r.teacher,room:r.room,year:yr(r.classCode),startTime:r.startTime});
  }

  const usedSlots=new Set(lessons.map(l=>l.slot));
  const morningSlots=MORNING_SLOTS.filter(s=>usedSlots.has(s));
  const afterSlots=AFTERNOON_SLOTS.filter(s=>usedSlots.has(s));
  const slots=[...morningSlots,...afterSlots];

  const allClasses=[...new Set(lessons.map(l=>l.classCode))].sort((a,b)=>{
    const ac=/^\d/.test(a),bc=/^\d/.test(b);
    if(ac&&!bc)return-1;if(!ac&&bc)return 1;
    return a.localeCompare(b,'it');
  });

  const dm=titleStr.match(/(\d{2}\/\d{2}\/\d{4})/);
  return{lessons,slots,allClasses,morningSlots,afterSlots,dateStr:dm?dm[1]:''};
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let RAW=null,SCHED=null;
let FILT={teacher:'',room:'',subject:''};

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const wrap=document.getElementById('tbl');
  if(!SCHED){wrap.innerHTML='';return;}
  const{lessons,slots,allClasses,morningSlots,afterSlots}=SCHED;
  const visible=applyFilters(lessons);
  const visSet=new Set(visible);
  const hasF=!!(FILT.teacher||FILT.room||FILT.subject);

  updateCount(visible.length,lessons.length);

  const activeClasses=hasF?allClasses.filter(c=>visible.some(l=>l.classCode===c)):allClasses;

  if(!slots.length||!activeClasses.length){
    wrap.innerHTML=`<div class="no-results"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Nessuna lezione trovata.</span></div>`;
    return;
  }

  const grid={};
  for(const s of slots){grid[s]={};for(const c of activeClasses)grid[s][c]=[];}
  for(const l of lessons){
    if(grid[l.slot]&&grid[l.slot][l.classCode]!==undefined)grid[l.slot][l.classCode].push(l);
  }

  const colors={y1:['var(--y1)','var(--y1b)'],y2:['var(--y2)','var(--y2b)'],y3:['var(--y3)','var(--y3b)'],y4:['var(--y4)','var(--y4b)'],gol:['var(--gol)','var(--golb)']};

  let h=`<table><thead><tr><th class="th-time">Ora</th>`;
  for(const c of activeClasses){
    const[bg,brd]=colors[yr(c)]||['#eee','#aaa'];
    h+=`<th style="background:${bg};border-bottom-color:${brd}"><span class="cn">${e(c)}</span></th>`;
  }
  h+=`</tr></thead><tbody>`;

  const hasBoth=morningSlots.length>0&&afterSlots.length>0;
  for(const s of slots){
    if(hasBoth&&s===afterSlots[0]){
      h+=`<tr class="divrow"><td class="dlabel" colspan="${activeClasses.length+1}">POMERIGGIO</td></tr>`;
    }
    h+=`<tr><td class="td-time">${s}</td>`;
    for(const c of activeClasses){
      const cellAll=lessons.filter(l=>l.slot===s&&l.classCode===c);
      h+=`<td>`;
      if(!cellAll.length){h+=`<div class="empty-cell"></div>`;}
      else{
        for(const l of cellAll){
          h+=makeCard(l,hasF&&!visSet.has(l));
        }
      }
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  h+=`</tbody></table>`;
  wrap.innerHTML=h;
}

function makeCard(l,dim){
  return`<div class="card ${l.year}${dim?' dim':''}">
    ${l.startTime?`<div class="ct">${e(l.startTime)}</div>`:''}
    <div class="cu">${e(l.uf||'')}</div>
    <div class="cr">${e(l.room||'')}</div>
    <div class="cd">${e(l.teacher||'')}</div>
  </div>`;
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function applyFilters(lessons){
  return lessons.filter(l=>{
    const ft=FILT.teacher.toLowerCase(),fr=FILT.room,fs=FILT.subject.toLowerCase();
    if(ft&&!(l.teacher||'').toLowerCase().includes(ft))return false;
    if(fr&&l.room!==fr)return false;
    if(fs&&!(l.uf||'').toLowerCase().includes(fs))return false;
    return true;
  });
}
function updateCount(v,t){
  const el=document.getElementById('count-badge');
  el.textContent=(FILT.teacher||FILT.room||FILT.subject)?`${v}/${t} lezioni`:`${t} lezioni`;
}

// ═══════════════════════════════════════════
// DATA LOAD
// ═══════════════════════════════════════════
function onDataReady(raw){
  RAW=raw;SCHED=buildSchedule(raw.rawLessons,raw.title);
  document.getElementById('state-screen').style.display='none';
  document.getElementById('controls').style.display='flex';
  document.getElementById('table-wrap').style.display='block';
  document.getElementById('legend').classList.add('on');
  document.getElementById('btn-pub').style.display='inline-block';
  document.getElementById('btn-new').style.display='inline-block';
  if(SCHED.dateStr)document.getElementById('hdr-date').textContent=SCHED.dateStr;
  populateFilters(SCHED.lessons);
  resetFilters();
}

// Try to auto-load orario.json from same folder
async function autoLoad(){
  try{
    const res = await fetch('orario.json?t='+Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(!data.rawLessons||!data.rooms) throw new Error('Formato non valido.');
    onDataReady(data);
  } catch(err){
    showError(err.message);
  }
}

function showError(msg){
  document.getElementById('spin').style.display='none';
  document.getElementById('state-title').textContent='Nessun orario disponibile';
  document.getElementById('state-msg').textContent=
    'Il file orario.json non è stato trovato nella cartella del sito. '+
    'Carica un file XLS per aggiornare l\'orario.';
  document.getElementById('upload-fallback').style.display='block';
}

function showUpload(){
  document.getElementById('state-screen').style.display='flex';
  document.getElementById('controls').style.display='none';
  document.getElementById('table-wrap').style.display='none';
  document.getElementById('legend').classList.remove('on');
  document.getElementById('btn-pub').style.display='none';
  document.getElementById('btn-new').style.display='none';
  document.getElementById('hdr-date').textContent='';
  document.getElementById('spin').style.display='none';
  document.getElementById('state-title').textContent='Carica un file XLS';
  document.getElementById('state-msg').textContent='';
  document.getElementById('upload-fallback').style.display='block';
}

// Manual XLS upload (fallback / admin use)
document.getElementById('file-input').addEventListener('change',ev=>{
  const file=ev.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=e2=>{
    try{onDataReady(parseXLS(e2.target.result));}
    catch(err){alert('Errore parsing: '+err.message);}
  };
  r.readAsText(file,'UTF-8');
});

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
function populateFilters(lessons){
  const ts=[...new Set(lessons.map(l=>l.teacher).filter(Boolean))].sort();
  document.getElementById('f-teacher').innerHTML=
    `<option value="">— tutti —</option>${ts.map(t=>`<option value="${e(t)}">${e(t)}</option>`).join('')}`;
  const rs=[...new Set(lessons.map(l=>l.room).filter(Boolean))].sort();
  document.getElementById('f-room').innerHTML=
    `<option value="">— tutte —</option>${rs.map(r=>`<option value="${e(r)}">${e(r)}</option>`).join('')}`;
}
document.getElementById('f-teacher').addEventListener('change',ev=>{FILT.teacher=ev.target.value;render();});
document.getElementById('f-room').addEventListener('change',ev=>{FILT.room=ev.target.value;render();});
document.getElementById('f-sub').addEventListener('input',ev=>{FILT.subject=ev.target.value;render();});
function resetFilters(){
  FILT={teacher:'',room:'',subject:''};
  document.getElementById('f-teacher').value='';
  document.getElementById('f-room').value='';
  document.getElementById('f-sub').value='';
  render();
}

// ═══════════════════════════════════════════
// DOWNLOAD orario.json  (tu lo metti sul server)
// ═══════════════════════════════════════════
function downloadJson(){
  if(!RAW)return;
  const payload=JSON.stringify({title:RAW.title,rooms:RAW.rooms,rawLessons:RAW.rawLessons,ts:Date.now()});
  const blob=new Blob([payload],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='orario.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
