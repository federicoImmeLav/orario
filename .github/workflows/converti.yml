name: Converti XLS in JSON

on:
  push:
    paths:
      - 'PianificazioneAule.xls'

jobs:
  converti:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install xlrd

      - name: Esegui conversione
        run: python converti.py

      - name: Commit e push orario.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add orario.json
          git diff --staged --quiet || git commit -m "🗓 Aggiorna orario $(date +'%d/%m/%Y')"
          git push
